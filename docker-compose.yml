services:
  control-server:
    build:
      context: ./apps/control-server
    image: probe-agent/control-server:latest
    container_name: probe-control-server
    environment:
      PROBE_DB_PATH: /data/probe.db
      CONTROL_API_KEYS: ${CONTROL_API_KEYS:-}
      CONTROL_ADMIN_USERNAME: ${CONTROL_ADMIN_USERNAME:-}
      CONTROL_ADMIN_PASSWORD: ${CONTROL_ADMIN_PASSWORD:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_MODEL: ${LLM_MODEL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_TIMEOUT: ${LLM_TIMEOUT:-30}
      INTELLIGENCE_LLM_PROVIDER: ${INTELLIGENCE_LLM_PROVIDER:-}
      INTELLIGENCE_LLM_MODEL: ${INTELLIGENCE_LLM_MODEL:-}
      PROBE_REPOSITORY_ROOTS: ${PROBE_REPOSITORY_ROOTS:-/repositories}
    volumes:
      - probe-data:/data
      - ${PROBE_REPOSITORY_HOST_ROOT:-.}:/repositories:ro
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request, sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8000/health', timeout=2).status == 200 else sys.exit(1)"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  dashboard:
    build:
      context: ./apps/dashboard
    image: probe-agent/dashboard:latest
    container_name: probe-dashboard
    ports:
      - "8501:8501"
    depends_on:
      control-server:
        condition: service_healthy
    restart: unless-stopped

volumes:
  probe-data:
